services:
  backend:
    build: .
    container_name: ats_backend
    ports:
      - "8000:8000"
    environment:
      - HF_TOKEN=${HF_TOKEN}
    volumes:
      - huggingface_cache:/root/.cache/huggingface   # ✅ only on backend
    restart: unless-stopped

  frontend:
    image: nginx:alpine
    container_name: ats_frontend
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro           # ✅ no huggingface here
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  huggingface_cache:                                  # ✅ defined at top level