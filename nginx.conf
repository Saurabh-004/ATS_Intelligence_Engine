server {
    listen 80;

    # Serve frontend files
    location / {
        root /usr/share/nginx/html;
        index indexx.html;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to FastAPI backend
    location /predict/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}